spring.application.name=billing-api

# Shown in Angular navbar (GET /api/nav/shell) and can be changed here after restart.
app.display-name=RR Silks Inventory Info

# PostgreSQL (matches libpq-style: host=localhost port=5432 dbname=postgres user=postgres
# connect_timeout=10 sslmode=prefer). Password: set env POSTGRES_PASSWORD or edit below.
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres?connectTimeout=10&sslmode=prefer
spring.datasource.username=postgres
spring.datasource.password=${POSTGRES_PASSWORD:admin}

spring.jpa.hibernate.ddl-auto=update
# Finished bills are stored in tables "bills" and "bill_lines" (JPA entity names remain Invoice / InvoiceLine).
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Profit shown on dashboard = sales * this margin (no per-invoice cost model yet)
app.dashboard.profit-margin=0.22

# Barcode label printer (Zebra / TSC raw TCP, port 9100). Override per request from UI.
app.barcode-printer.default-host=
app.barcode-printer.default-port=9100

# Jackson 3 (Spring Boot 4): do not use spring.jackson.serialization.write-dates-as-timestamps —
# that enum was removed. java.time types (e.g. Instant) serialize as ISO-8601 strings by default.
