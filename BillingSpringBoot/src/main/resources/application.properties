spring.application.name=billing-api

# Render sets PORT; default 8080 for local Docker.
server.port=${PORT:8080}

# Shown in Angular navbar (GET /api/nav/shell) and can be changed here after restart.
app.display-name=RR Silks Inventory Info

# Comma-separated frontend origins (set APP_CORS_ALLOWED_ORIGINS on Render when Angular is deployed).
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

# PostgreSQL — Render: link Postgres (sets DATABASE_URL) OR set SPRING_DATASOURCE_* manually:
# SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD (or POSTGRES_PASSWORD).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres?connectTimeout=10&sslmode=prefer}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:admin}}

spring.jpa.hibernate.ddl-auto=update
# Finished bills are stored in tables "bills" and "bill_lines" (JPA entity names remain Invoice / InvoiceLine).
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.default_batch_fetch_size=16

# Profit shown on dashboard = sales * this margin (no per-invoice cost model yet)
app.dashboard.profit-margin=0.22

# Barcode label printer (Zebra / TSC raw TCP, port 9100). Override per request from UI.
app.barcode-printer.default-host=
app.barcode-printer.default-port=9100

# Jackson 3 (Spring Boot 4): do not use spring.jackson.serialization.write-dates-as-timestamps —
# that enum was removed. java.time types (e.g. Instant) serialize as ISO-8601 strings by default.
