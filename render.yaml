# Render Blueprint — Spring Boot API (Docker)
# Docs: https://render.com/docs/deploy-docker
#
# If you already created the Postgres DB in the dashboard, skip the databases block and
# link it to the web service instead (Environment → Add from database → DATABASE_URL).

services:
  - type: web
    name: billing-api
    runtime: docker
    region: oregon
    plan: free
    rootDir: BillingSpringBoot
    dockerfilePath: Dockerfile
    healthCheckPath: /api/nav/shell
    envVars:
      - key: JAVA_TOOL_OPTIONS
        value: -XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0
      # REQUIRED — in Render dashboard: Environment → "Add environment group" / Link Postgres
      # so DATABASE_URL is present, OR set all three SPRING_DATASOURCE_* variables below.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # When Angular is on Render or elsewhere, add its URL:
      # - key: APP_CORS_ALLOWED_ORIGINS
      #   value: https://your-frontend.onrender.com

# Uncomment only if creating a new database via Blueprint:
# databases:
#   - name: rrbillingdb
#     databaseName: rrbillingdb
#     plan: free
#     region: oregon
