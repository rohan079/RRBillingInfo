name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'BillingApplication/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'BillingApplication/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: BillingApplication

jobs:
  build-and-test:
    name: Build & test Angular app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: BillingApplication/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build -- --configuration=production

      - name: Unit tests
        run: npm test -- --no-watch
        env:
          CI: true
