name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - 'BillingSpringBoot/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'BillingSpringBoot/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: BillingSpringBoot

jobs:
  test:
    name: Test Spring Boot API
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.9-eclipse-temurin-17-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        run: mvn -B test

  package:
    name: Package Spring Boot API
    runs-on: ubuntu-latest
    needs: test
    container:
      image: maven:3.9.9-eclipse-temurin-17-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build JAR
        run: mvn -B -DskipTests package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: billing-api-jar
          path: target/demo-*.jar
          if-no-files-found: error
          retention-days: 7
