# Build Docker images and pass BillingVarGroup at deploy/run time (not baked into images).
trigger:
  branches:
    include:
      - main
      - master
  paths:
    include:
      - BillingApplication/**
      - BillingSpringBoot/**
      - docker/**
      - docker-compose.yml
      - azure-pipelines/docker.yml

pr:
  branches:
    include:
      - main
      - master

variables:
  - group: BillingVarGroup
  - name: apiImage
    value: billing-api:$(Build.BuildId)
  - name: webImage
    value: billing-web:$(Build.BuildId)

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Docker
    displayName: Build images (BillingVarGroup)
    jobs:
      - job: BuildImages
        displayName: Build API and web images
        steps:
          - checkout: self

          - task: Docker@2
            displayName: Build API image
            inputs:
              command: build
              Dockerfile: BillingSpringBoot/Dockerfile
              buildContext: BillingSpringBoot
              tags: |
                $(apiImage)
                billing-api:latest

          - task: Docker@2
            displayName: Build web image
            inputs:
              command: build
              Dockerfile: BillingApplication/Dockerfile
              buildContext: BillingApplication
              tags: |
                $(webImage)
                billing-web:latest

          # Example run (uncomment for self-hosted / test deploy agents with Docker).
          # Secrets come from BillingVarGroup — never commit them to the repo.
